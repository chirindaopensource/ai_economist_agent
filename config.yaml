# ==============================================================================
# AGENTIC RETRIEVAL AND GRAPH SEARCH PARAMETERS
# ==============================================================================
# Knowledge Graph Constraints and RAG Settings (Section 3.1, Appendix C)

retrieval_graph_parameters:
  # int: Limits text retrieval to 6 spans per application. Paper-exact (Tables 6, 10).
  text_evidence_top_k: 6
  # int: Limits graph-retrieved model specs before selection to 12.
  # Unspecified in manuscript; rational implementation choice.
  model_context_top_k: 12
  # bool: Prohibits unconstrained graph traversal. Paper-exact (Section 2.3).
  allow_neighborhood_expansion: false
  # bool: Enforces explicit path queries rather than generic lookups. Paper-exact (Section 3.1).
  require_task_specific_queries: true
  # int: Maximum edge depth for graph traversals from Scenario node.
  # Unspecified in manuscript; rational bounded-depth choice.
  max_path_depth: 5
  # bool: Ensures atomic graph mutations for ModelRun and ModelOutputPoint nodes.
  # Paper-exact (Step 8, Algorithm 1).
  enable_write_back_transactions: true
  # NOTE: The paper states "rank by tag overlap with scenario, then by synthetic confidence
  # score" but does NOT specify whether this is lexicographic ordering or weighted
  # combination. The following implements weighted combination (50/50):
  #
  # float: Weight for tag overlap in text retrieval scoring.
  # Unspecified in manuscript; 50/50 weighted interpretation.
  tag_overlap_weight: 0.5
  # float: Weight for synthetic confidence score in text retrieval scoring.
  # Unspecified in manuscript; 50/50 weighted interpretation.
  confidence_score_weight: 0.5


# ==============================================================================
# COMPUTATIONAL SOLVER PARAMETERS
# ==============================================================================
# Numerical Solver Settings for External Mathematical Layer (Step 7)

computational_solver_parameters:
  # int: Fixed 12-step horizon for all mathematical executions. Paper-exact.
  model_horizon_steps: 12
  # string: NumPy dtype enforced across all mathematical operations. Standard engineering practice.
  numerical_precision: "float64"
  # int: Seed for drawing shock innovations in DSGE and MS-VAR simulations. Paper-exact.
  random_seed: 42
  # float: Convergence tolerance for generalized eigenvalues in Blanchard-Kahn conditions.
  # Unspecified in manuscript; standard numerical choice.
  bk_tolerance: 1.0e-8
  # float: Convergence tolerance for the Markov regime probabilities.
  # Unspecified in manuscript; standard numerical choice.
  hamilton_filter_tolerance: 1.0e-8
  # int: Maximum iterations before a solver failure is raised.
  # Unspecified in manuscript; standard numerical choice.
  max_solver_iterations: 1000
  # bool: Halt execution if Blanchard-Kahn conditions fail. Paper-exact (Algorithm 2).
  enforce_determinacy: true


# ==============================================================================
# AGENTIC PROMPT TEMPLATES
# ==============================================================================
# High-Fidelity LLM Prompt Schemas for Pipeline Orchestration
# All templates paper-exact from Section 3.6

prompt_templates:

  # Planner Agent prompt: decomposes scenario into structured analysis plan
  planner_agent_prompt: |
    ### Job Description
    You are the Planner Agent in an AI Economist framework. Your role is to read an economic scenario and formulate a structured analysis plan to guide downstream retrieval and model selection. You do not select models yourself; you define the mathematical and economic requirements.

    ### Skills
    - Macroeconomic theory and scenario decomposition
    - Econometric model requirement analysis
    - Structured data extraction

    ### Python Scripts
    scenario = {scenario}

    ### Output Contract
    Return ONLY a valid JSON object with the following keys:
    - "economic_objective": string describing the primary macroeconomic goal.
    - "target_variables": list of strings representing key economic indicators.
    - "relevant_shocks": list of strings representing exogenous stressors.
    - "model_selection_objective": string describing the mathematical requirements for the model.
    Do not include any text outside the JSON object.

    ### Task
    Given the scenario above, produce the analysis plan.

  # Model-Selection Agent prompt: selects executable spec and forms execution request tuple
  model_selection_agent_prompt: |
    ### Job Description
    You are the Model-Selection Agent in an AI Economist framework. Your role is to select an appropriate executable model specification from a graph-retrieved context based on an economic scenario and analysis plan. You must map this selection to a structured execution request tuple. You must not invent models; select only from the provided context.

    ### Skills
    - Econometric model evaluation and matching
    - Knowledge graph context parsing
    - Structured execution request formulation

    ### Python Scripts
    scenario = {scenario}
    analysis_plan = {plan}
    model_context = {model_context}

    ### Output Contract
    Return ONLY a valid JSON object with the following keys:
    - "model_specification": string (exact spec_id from context)
    - "model_family": string
    - "implementation_family": string (must match an available executable family)
    - "execution_tool": string (e.g., "dsge_lite_runner")
    - "expected_outputs": list of strings
    Do not include any text outside the JSON object. Do not invent models not present in the context.

    ### Task
    Evaluate the model context against the plan and scenario. Output the structured execution request.

  # Report Generator (LLM-only condition): narrative from scenario alone; no evidence or models
  report_gen_llm_only_prompt: |
    ### Job Description
    You are the Report Generator Agent operating in the LLM-only condition. Your role is to write an economist-style narrative based solely on a provided scenario. You have no external evidence or models.

    ### Skills
    - Macroeconomic narrative generation
    - Economic coherence maintenance

    ### Python Scripts
    scenario = {scenario}

    ### Output Contract
    Output a coherent economic report in plain text. Do not use external evidence or mathematical models. Do not claim any model was executed.

    ### Task
    Write a narrative based ONLY on the scenario provided.

  # Report Generator (RAG-only condition): evidence-grounded narrative; no model execution claims
  report_gen_rag_only_prompt: |
    ### Job Description
    You are the Report Generator Agent operating in the RAG-only condition. Your role is to write an economic narrative grounded in retrieved text evidence.

    ### Skills
    - Evidence synthesis and citation
    - Narrative constraint enforcement

    ### Python Scripts
    scenario = {scenario}
    evidence_spans = {evidence_spans}

    ### Output Contract
    Output an economic report in plain text. Cite evidence using their IDs (e.g., EV_1161).
    CRITICAL CONSTRAINT: You must NOT claim that a mathematical model has been executed. Limit claims to the provided textual evidence.

    ### Task
    Write a narrative using the scenario and the retrieved evidence. Adhere strictly to the critical constraint.

  # Report Generator (Model-grounded GraphRAG condition): full information set; strict separation
  report_gen_model_grounded_prompt: |
    ### Job Description
    You are the Report Generator Agent operating in the Model-grounded GraphRAG condition. Your role is to generate a traceable economic report linking narrative to retrieved evidence, graph paths, and executed mathematical model outputs.

    ### Skills
    - Model-output interpretation
    - Graph path tracing and audit generation
    - Separation of qualitative interpretation and quantitative facts

    ### Python Scripts
    scenario = {scenario}
    evidence_spans = {evidence_spans}
    pre_run_paths = {pre_run_paths}
    model_specification = {model_specification}
    execution_request = {execution_request}
    model_run = {model_run}
    model_output_table = {model_output_table}
    post_run_paths = {post_run_paths}

    ### Output Contract
    Output an economic report in plain text.
    CRITICAL INSTRUCTION: You must distinguish qualitative interpretation from model-dependent statements. Explicitly state which parts of your analysis are narrative interpretation and which parts are directly traceable to the executed model outputs. Ensure the report exposes enough information to trace the source of its claims (Audit criterion).

    ### Task
    Synthesize the inputs into a model-grounded report. Ensure strict separation of qualitative and quantitative claims as mandated.

  # Judge Agent prompt: strict 0-5 rubric evaluation; enforces model_grounding logic gate
  judge_agent_prompt: |
    ### Job Description
    You are the Judge Agent in an AI Economist framework. Your role is to evaluate a generated economic report against a ground-truth information set using a strict 0-5 scoring rubric.

    ### Skills
    - Rigorous evaluation and fact-checking
    - Rule-based scoring and audit verification
    - Strict constraint enforcement

    ### Python Scripts
    condition_information_set = {condition_information_set}
    generated_report = {generated_report}

    ### Output Contract
    Return ONLY a valid JSON object with integer scores (0-5) for the following keys:
    - "evidence_grounding": Report uses retrieved evidence rather than unsupported claims.
    - "graph_reasoning": Report uses graph paths or relationships when supplied.
    - "model_grounding": Report is linked to a selected model spec AND executed output. NOTE: A high score requires an executed model object/output. Mentioning a model name without execution is insufficient and MUST receive a 0.
    - "numerical_discipline": Numerical statements are consistent with supplied info.
    - "economic_coherence": Economic interpretation is internally consistent.
    - "audit": Report exposes enough info to trace the source of claims.
    Do not include any text outside the JSON object.

    ### Task
    Evaluate the generated report against the condition information set. Apply the rubric strictly, paying special attention to the model_grounding constraint.


# ==============================================================================
# NETWORK ARCHITECTURE AND INFERENCE PARAMETERS
# ==============================================================================
# LLM Transformer Architecture and Inference-Time Compute Settings
# NOTE: These are for reference/documentation only; not operationally required for reproduction.
# Parameters sourced from public Llama 3.1 8B documentation, not the paper.

network_architecture_parameters:
  # string: Architecture family. Unspecified in manuscript; from Llama 3.1 public spec.
  model_type: "llama"
  # int: Transformer decoder blocks. Unspecified in manuscript; from Llama 3.1 8B spec.
  num_hidden_layers: 32
  # int: Latent dimension of hidden states. Unspecified in manuscript; from Llama 3.1 8B spec.
  hidden_size: 4096
  # int: Multi-head attention query heads. Unspecified in manuscript; from Llama 3.1 8B spec.
  num_attention_heads: 32
  # int: Grouped-query attention heads for KV cache optimization.
  # Unspecified in manuscript; from Llama 3.1 8B spec.
  num_key_value_heads: 8
  # int: SwiGLU feed-forward network inner dimension.
  # Unspecified in manuscript; from Llama 3.1 8B spec.
  intermediate_size: 14336
  # int: Tokenizer vocabulary size. Unspecified in manuscript; from Llama 3.1 8B spec.
  vocab_size: 128256
  # float: Rotary positional embedding base frequency.
  # Unspecified in manuscript; from Llama 3.1 8B spec.
  rope_theta: 500000.0
  # int: Maximum sequence length for input tokens.
  # Unspecified in manuscript; from Llama 3.1 8B spec.
  max_context_window: 128000
  # bool: Utilize Key-Value caching for sequential agentic calls. Standard practice.
  kv_cache_enabled: true

  # Conceptual mapping as model is inference-only locally
  network_training_parameters:
    # string: No fine-tuning performed in study
    training_status: "pretrained"
    # string: Inference compute precision. Standard practice.
    precision_dtype: "float16"
    # Standard local quantization for 8B models. Unspecified in manuscript.
    quantization_config:
      # string: Quantization method
      quant_method: "bitsandbytes"
      # bool: Load model in 4-bit precision
      load_in_4bit: true


# ==============================================================================
# PLOT CONSTRUCTION PARAMETERS
# ==============================================================================
# Visualization Settings for Graph Paths and Model Outputs (Figures 1-7)
# NOTE: These enable figure reproduction but are not required for reproducing the study's findings.
# All parameters unspecified in manuscript; implementation choices for aesthetic replication.

plot_construction_parameters:
  # string: Fixed-size circular markers for graph nodes.
  # Unspecified in manuscript; standard matplotlib choice.
  graph_node_marker: "o"
  # int: Visual size of nodes in GraphRAG path plots. Unspecified in manuscript.
  graph_node_marker_size: 50
  # string: Layout for rendering post-ModelRun paths. Unspecified in manuscript.
  graph_layout_algorithm: "spring"
  # bool: Labels shortened and layout coordinates assigned for readability.
  # Unspecified in manuscript.
  graph_label_shortening: true
  # bool: No economic nodes/relationships added visually post-hoc.
  # Unspecified in manuscript.
  graph_add_economic_nodes: false
  # string: X-axis representing the 12-step horizon. Unspecified in manuscript.
  model_path_x_axis: "time_step"
  # list[int]: Horizon bounds. Unspecified in manuscript.
  model_path_x_axis_limit:
    - 0
    - 12
  # string: Y-axis label explicitly defined in Section 4. Unspecified in manuscript.
  model_path_y_axis: "synthetic_macro_financial_units"
  # string: Bar chart for discrete stress metrics. Unspecified in manuscript.
  bank_metrics_plot_type: "bar"
  # string: Grouped bar chart for 0-5 criteria across conditions. Unspecified in manuscript.
  judge_scores_plot_type: "grouped_bar"
  # int: Publication quality resolution. Unspecified in manuscript.
  figure_dpi: 300
  # Color scheme for three conditions. Unspecified in manuscript; standard matplotlib defaults.
  color_palette:
    # string: Standard matplotlib blue
    llm_only: "#1f77b4"
    # string: Standard matplotlib orange
    rag_only: "#ff7f0e"
    # string: Standard matplotlib green
    model_grounded: "#2ca02c"


# ==============================================================================
# ESSENTIAL METHODOLOGICAL NOTES
# ==============================================================================
# Architectural Constraints and Epistemic Guarantees

methodological_notes:
  # string: The LLM is structurally prohibited from generating quantitative model-dependent
  # claims. Numerical paths and stress metrics are produced strictly by validated
  # computational functions external to the LLM.
  llm_quantitative_prohibition: >-
    The LLM is structurally prohibited from generating quantitative
    model-dependent claims. Numerical paths and stress metrics are produced
    strictly by validated computational functions external to the LLM.

  # string: Text spans support narrative statements; model specifications define what can
  # be executed; implementation functions compute the output; model-run and output-point
  # nodes record what was computed. This prevents RAG-only conditions from acting as
  # model-selection conditions.
  graph_separation_principle: >-
    Text spans support narrative statements; model specifications define what
    can be executed; implementation functions compute the output; model-run and
    output-point nodes record what was computed. This prevents RAG-only
    conditions from acting as model-selection conditions.

  # string: Local LLM (llama3.1:8b) is run at temperature 0 with seed 42. All
  # mathematical shock draws use numpy.random.default_rng(seed=42).
  determinism_enforcement: >-
    Local LLM (llama3.1:8b) is run at temperature 0 with seed 42. All
    mathematical shock draws use numpy.random.default_rng(seed=42).

  # string: Model-grounded GraphRAG reports must explicitly distinguish qualitative
  # interpretation from model-dependent statements. Mentioning a model name without an
  # executed ModelRun object results in a Judge Agent model_grounding score of 0.
  condition_specific_grounding: >-
    Model-grounded GraphRAG reports must explicitly distinguish qualitative
    interpretation from model-dependent statements. Mentioning a model name
    without an executed ModelRun object results in a Judge Agent
    model_grounding score of 0.

  # string: The knowledge graph is purged (clear_graph_on_init) before each application
  # run to ensure post-run paths reflect only the current application, preventing state
  # leakage across experimental conditions.
  graph_state_isolation: >-
    The knowledge graph is purged (clear_graph_on_init) before each
    application run to ensure post-run paths reflect only the current
    application, preventing state leakage across experimental conditions.

  # string: The paper does not provide full autoregressive matrices A_1,St or full
  # covariance matrices Sigma_St for the MS-VAR. Diagonal covariance matrices and
  # diagonal autoregressive matrices are used as rational implementation choices. Exact
  # numeric replication of Tables 12 and 13 is not guaranteed without these missing matrices.
  ms_var_matrix_limitation: >-
    The paper does not provide full autoregressive matrices A_1,St or full
    covariance matrices Sigma_St for the MS-VAR. Diagonal covariance matrices
    and diagonal autoregressive matrices are used as rational implementation
    choices. Exact numeric replication of Tables 12 and 13 is not guaranteed
    without these missing matrices.

  # string: The paper states "rank by tag overlap with scenario, then by synthetic
  # confidence score" but does not specify lexicographic vs. weighted combination. A
  # 50/50 weighted combination is implemented. If retrieval outputs do not match
  # reported top-6 evidence IDs, tag schema reverse-engineering or hard-coding target
  # outputs may be required.
  retrieval_ranking_interpretation: >-
    The paper states 'rank by tag overlap with scenario, then by synthetic
    confidence score' but does not specify lexicographic vs. weighted
    combination. A 50/50 weighted combination is implemented. If retrieval
    outputs do not match reported top-6 evidence IDs, tag schema
    reverse-engineering or hard-coding target outputs may be required.
