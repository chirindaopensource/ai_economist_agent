# Explicit scenario narratives for both applications (primary inputs to pipeline)
application_scenarios:

  application_1:
    # string: Unique origin node identifier
    scenario_id: "SCEN_APP1_INFLATION"
    # int: Application index
    application_number: 1
    # string: Application label
    title: "U.S. Inflation Persistence and Federal Reserve Policy"
    # string: Sole input to Planner Agent
    narrative_text: >-
      Services inflation remains persistent in the U.S. economy while
      labor-market cooling is gradual. The Federal Reserve keeps policy
      restrictive, which lifts Treasury yields and slows real activity.
    # str (ISO 8601): Creation time
    created_timestamp: "2024-06-19T10:00:00Z"
    # bool: Triggers agentic pipeline
    analysis_required: true

  application_2:
    # string: Unique origin node identifier
    scenario_id: "SCEN_APP2_CRE"
    # int: Application index
    application_number: 2
    # string: Application label
    title: "U.S. Commercial Real Estate Refinancing Stress"
    # string: Sole input to Planner Agent
    narrative_text: >-
      Higher long-term interest rates and wider credit spreads create
      refinancing pressure for U.S. commercial real estate borrowers.
      The increase in borrowing costs can make existing debt harder to
      roll over and can reduce demand for new lending. Banks may face
      higher credit losses if property income is insufficient to absorb
      refinancing costs.
    # str (ISO 8601): Creation time
    created_timestamp: "2024-06-19T10:00:00Z"
    # bool: Triggers agentic pipeline
    analysis_required: true


